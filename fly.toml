app = "quidly-staging"
primary_region = "jnb"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"

[deploy]
  release_command = "pnpm --filter api exec prisma migrate deploy"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"
